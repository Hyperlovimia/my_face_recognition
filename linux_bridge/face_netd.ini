# face_netd v1 config
# 修改 mqtt_url 为电脑主机局域网 IPv4
# 如果 server_pc 运行在 WSL / Docker 中：
# - 这里填写 Windows Wi-Fi / Ethernet 网卡地址，例如 192.168.160.8
# - 不要填写 vEthernet (WSL) 的 172.23.x.x

device_id = k230-dev-01
mqtt_url = mqtt://192.168.160.8:1883
mqtt_client_id = face-netd-k230-dev-01
mqtt_username =
mqtt_password =
heartbeat_interval_ms = 5000
ipc_connect_retry_ms = 500
ipc_sync_timeout_ms = 3000
mqtt_keepalive_s = 15
