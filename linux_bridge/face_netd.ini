# face_netd v1 config
# 修改 mqtt_url 为电脑主机局域网 IPv4
# 如果 server_pc 运行在 WSL / Docker 中：
# - 这里填写 Windows Wi-Fi / Ethernet 网卡地址，例如 192.168.160.8
# - 不要填写 vEthernet (WSL) 的 172.23.x.x

device_id = k230-dev-01
mqtt_url = mqtt://192.168.160.8:1883
mqtt_client_id = face-netd-k230-dev-01
mqtt_username =
mqtt_password =
# Status publish to k230/<id>/up/status (UI refresh cadence; min 200 in code)
heartbeat_interval_ms = 1000
ipc_connect_retry_ms = 500
ipc_sync_timeout_ms = 3000
mqtt_keepalive_s = 15

# 板端触摸注册 UI
ui_enabled = 1
ui_touch_device = /dev/input/event0
ui_preview_timeout_ms = 30000
ui_overlay_profile = dongshanpi_nt35516

# 人脸库目录（Linux 小核可读路径，需与 face_ai 启动参数中的 db_dir 一致）
face_db_dir = /sharefs/face_db

# 考勤 JSONL：根目录下每日单文件 <YYYY-MM-DD>.jsonl（例 /mnt/tf/face_logs/2026-05-06.jsonl）。
# 若大核 /sd 不可写，face_netd 收到 IPC 后在此镜像写入 JSONL。
# 日历：Linux 已校时用本机日期；未校时用 PC 时间 via MQTT（k230/time_sync，推荐）或 HTTP /api/server-time（常需放行 8000）。
# server_http_base 留空则仍尝试 HTTP（mqtt 主机 :8000）；填 disabled / off / - 则只用 MQTT。
# server_http_base = http://10.164.185.182:8000
attendance_log_base = /mnt/tf/face_logs
# 考勤 wall_time / 文件名日期相对 UTC 向东偏移（分钟）；中国默认 480。
# server_pc 在 Docker 里常为 UTC：若 MQTT 下发 utc_offset_minutes=0，仍可用此处非 0 值对齐本地（要写 UTC 考勤请设为 0）。
# attendance_tz_offset_minutes = 480
