services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: face-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  face-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: face-web
    depends_on:
      - mosquitto
    environment:
      # 影响考勤 JSONL 的 utc_offset_minutes（MQTT/HTTP）；不设 TZ 时容器多为 UTC，墙钟会与本地差一整段时区。
      TZ: ${TZ:-Asia/Shanghai}
      FACE_MQTT_HOST: mosquitto
      FACE_MQTT_PORT: "1883"
      FACE_WEB_DB_PATH: /app/data/face_web.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
